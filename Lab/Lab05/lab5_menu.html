    <title>Document</title>

    <style>
      .student-footer {
        background: #fff;
        border-top: 1.5px solid #e0e0e0;
        padding: 14px 20px;
        text-align: center;
        font-family: Arial, sans-serif;
        font-size: 14px;
        color: #333;
        letter-spacing: 0.2px;
      }

      .student-footer strong {
        color: #111;
        font-weight: 600;
      }
    </style>

  <style>
    .hori {
      display: flex;
      list-style: none;
    }

    .hori li {
      padding: 10px;
      background-color: aquamarine;
    }

    .hori li a {
      text-decoration: none;
    }

    .hori li:hover {
      background-color: yellow;
      border-radius: 10px;
    }

    .hori li a:hover {
      color: black;
      font-weight: bold;
    }

    .verti {
      list-style: none;
    }

    .verti li {
      padding: 10px;
      margin-bottom: 1px;
      background-color: rgb(0, 89, 255);
      transition: all 0.3s ease;
    }

    .verti li a {
      text-decoration: none;
      color: black;
    }

    .verti li a:hover {
      font-style: italic;
    }

    .verti li:hover {
      background-color: aqua;
      filter: brightness(1.3);
    }
  </style>
